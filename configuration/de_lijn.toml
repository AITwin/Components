SCHEDULE = "15m"

[collectors.gtfs_rt_trip_update]

PATH = "de_lijn.collectors.gtfs_rt_trip_update.DeLijnGTFSRTTripUpdateCollector"
DATA_FORMAT = "gtfs_realtime"
DATA_TYPE = "binary"
SCHEDULE = "20s"
